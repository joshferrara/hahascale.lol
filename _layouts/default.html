<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="{{ site.description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="css/main.css">
  {% if page.markdown_path %}<link rel="alternate" type="text/markdown" href="{{ page.markdown_path }}" title="Markdown version">{% endif %}
{% include head.html %}
</head>
<body>
  <div class="container">
    <h1><a href="./">{{ site.tag_text }}</a></h1>
    {{ content }}
  </div>
  <div class="contact-toggle-wrapper">
    <button class="contact-toggle" onclick="this.parentElement.classList.toggle('open')">Contact Us</button>
    <div class="contact-panel">
      <div id="issued-widget-container"></div>
    </div>
  </div>

  <script src="https://issued.dev/widget.js" onload="
    Issued.init({
      projectId: 'ks738kdht2rjs6hvrthbkr336x84bm7w',
      fields: {
        subject: { visible: true, required: true, label: 'Subject' },
        description: { visible: true, required: true, label: 'Description' },
        email: { visible: true, required: false, label: 'Email' },
        name: { visible: true, required: false, label: 'Name' }
      },
      customization: {
        theme: 'light',
        primaryColor: '#3b82f6',
        borderRadius: 8,
        fontFamily: 'system-ui, sans-serif'
      },
      metadata: {
        projectName: 'HahaScale.lol',
        githubRepo: 'joshferrara/hahascale.lol'
      }
    });
  "></script>
{% include scripts.html %}
</body>
</html>
