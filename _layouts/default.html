<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="{{ site.description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="css/main.css">
  {% if page.markdown_path %}<link rel="alternate" type="text/markdown" href="{{ page.markdown_path }}" title="Markdown version">{% endif %}
{% include head.html %}
</head>
<body>
  <div class="container">
    <h1><a href="./">{{ site.tag_text }}</a></h1>
    {{ content }}
  </div>
  <!-- Issued Widget -->
  <div id="issued-widget-container"></div>
  <script src="https://issued.dev/widget/issued.js"></script>
  <script>
    Issued.init({
      "projectId": "ks7dt4yv6e17v8w42n0ybptt4x854j94",
      "fields": {
        "description": {
          "visible": true,
          "required": true
        },
        "email": {
          "visible": true,
          "required": true
        }
      },
      "launcher": {
        "enabled": true,
        "mode": "popover",
        "style": "pill",
        "position": "bottom-right",
        "label": "Help",
        "icon": "chat",
        "color": "#0e6227",
        "modal": {
          "headerTitle": "Support"
        }
      }
    });
  </script>
{% include scripts.html %}
</body>
</html>
